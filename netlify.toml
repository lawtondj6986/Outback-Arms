# Outback Arms — Netlify deploy config
[build]
  publish = "."

# Long-cache static assets, never cache the HTML (so inventory/config edits go live)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.(png|jpg|jpeg|webp|svg|woff2|css|js)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pretty URL: serve the single file at root
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 200
