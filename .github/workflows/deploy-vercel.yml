name: Deploy to Vercel

# Auto-deploys the site to Vercel on every push to main.
# EASIEST PATH: use Vercel's built-in Git integration instead — import the
# repo once at vercel.com/new and it auto-deploys on every push with NO
# secrets and NO workflow. Use this file only if you specifically want
# CI-driven deploys.
#
# To enable: add three repository secrets under
#   Settings ▸ Secrets and variables ▸ Actions ▸ New repository secret
#     VERCEL_TOKEN       — vercel.com/account/tokens
#     VERCEL_ORG_ID      — from .vercel/project.json after `vercel link`
#     VERCEL_PROJECT_ID  — from .vercel/project.json after `vercel link`
# Until all three are set, this workflow runs green and simply skips.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check configuration
        id: gate
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Vercel CI not configured::Easiest option is Vercel's Git integration (import once at vercel.com/new — auto-deploys on push, no secrets). This CI workflow is optional. Skipping for now."
          fi

      - name: Checkout
        if: steps.gate.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Deploy to production
        if: steps.gate.outputs.ready == 'true'
        run: |
          npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
